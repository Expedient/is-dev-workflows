name: build and push
on:
  workflow_call:
    inputs:
      tags:
        required: true
        type: string
      use-cache:
        description: "Use cache for building the Docker image"
        required: false
        default: "true"
        type: string
      registry:
        description: "The docker registry to push the image to"
        required: false
        default: "docker.io"
        type: string
    secrets:
      IMAGE_REGISTRY_USERNAME:
        required: true
      IMAGE_REGISTRY_PASSWORD:
        required: true
      build_args:
        required: false
    outputs:
      digest:
        description: "The digest of the docker image."
        value: ${{ jobs.build-and-push.outputs.digest }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.docker_build.outputs.digest }}
    steps:
      - name: Check Out Repo 
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.IMAGE_REGISTRY_USERNAME }}
          password: ${{ secrets.IMAGE_REGISTRY_PASSWORD }}
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v2
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v4
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: ${{ inputs.tags }}
          build-args: ${{ secrets.build_args }}
      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}